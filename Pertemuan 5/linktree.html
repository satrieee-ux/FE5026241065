<!DOCTYPE html>

<head>

    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- FontAwesome untuk Ikon Footer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        body {
            background-color: #ffffff; /* Sesuai dengan tema asli */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #000000;
        }
        
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 3rem 1rem;
        }

        .profile-img {
            width: 96px;
            height: 96px;
            object-fit: cover;
        }

        /* Kustomisasi Tombol agar mirip Linktree */
        .btn-linktree {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px; /* Menggunakan rounded yang sedikit kotak sesuai source */
            padding: 0.5rem;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
            position: relative;
            min-height: 64px;
        }

        .btn-linktree:hover {
            background-color: #f8f9fa;
            color: #000000;
            transform: scale(1.02);
            text-decoration: none;
        }

        /* Gaya untuk thumbnail di dalam tombol */
        .link-thumbnail {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 4px;
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        .link-text {
            width: 100%;
            padding: 0 56px; /* Memberi ruang untuk thumbnail */
        }

        .section-header {
            font-size: 16px;
            font-weight: bold;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .footer-icon {
            color: #000;
            font-size: 1.5rem;
            margin: 0 10px;
            transition: transform 0.2s;
        }

        .footer-icon:hover {
            transform: scale(1.1);
        }
    </style>
</head>
